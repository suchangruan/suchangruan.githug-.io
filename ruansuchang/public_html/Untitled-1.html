<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>千里江山图</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#000;
  }
  .scroll{
    width:100%;
    height:100%;
    background:url(pic.jpg) no-repeat center center;
    background-size:auto 100%;
    animation:move 60s linear infinite;
  }
  @keyframes move{
    0%{background-position:-3000px center;}
    100%{background-position:0 center;}
  }
</style>
</head>
<body>
  <div class="scroll"></div>
</body>
</html>
