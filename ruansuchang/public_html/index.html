<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tower of Hanoi · 3D Ultimate</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a2a44, #0a0e1a);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1400px;
        }

        .game-container {
            background: rgba(25, 35, 55, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 80px;
            padding: 1.5rem 2rem 2rem;
            box-shadow: 0 35px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,150,0.6);
            margin: 1.5rem;
            width: fit-content;
            max-width: 1400px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin: 0 0 10px;
            color: #FFE6B0;
            text-shadow: 0 5px 0 #5a3e2b;
            letter-spacing: 2px;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.6);
            padding: 8px 25px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .hanoi-stage {
            perspective: 1200px;
            perspective-origin: 50% 40%;
            margin: 20px 0;
        }

        .pegs-wrapper {
            display: flex;
            justify-content: center;
            gap: clamp(2rem, 8vw, 5rem);
            flex-wrap: wrap;
            transform-style: preserve-3d;
        }

        /* 每个柱子容器 - 相对定位，用于让圆盘正确摆放 */
        .peg {
            position: relative;
            width: 220px;
            min-width: 170px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 60px 60px 30px 30px;
            padding: 20px 10px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 15px 20px rgba(0,0,0,0.4);
            transform-style: preserve-3d;
        }
        .peg:hover {
            transform: translateY(-6px);
            background: rgba(0,0,0,0.45);
        }
        .peg.selected {
            background: radial-gradient(circle, rgba(255, 200, 50, 0.6), rgba(180, 120, 20, 0.8));
            box-shadow: 0 0 0 3px gold, 0 20px 25px black;
            transform: translateY(-6px);
        }

        /* 圆盘堆叠区 - 相对定位，用于圆盘垂直排列且被柱子穿过 */
        .disks-stack {
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            justify-content: flex-start;
            min-height: 220px;
            width: 100%;
            z-index: 2;
        }

        /* 3D 圆盘 */
        .disk {
            position: relative;
            height: 32px;
            border-radius: 40px;
            margin: 2px 0;
            background: linear-gradient(145deg, #f8f0d0, #d4a373);
            box-shadow: 0 8px 12px rgba(0,0,0,0.3), inset 0 1px 3px rgba(255,255,200,0.9);
            border: 1px solid rgba(255,220,150,0.9);
            transform: translateZ(5px) rotateX(1deg);
            transition: all 0.1s;
            /* 圆孔效果：用径向渐变模拟中间被柱子穿过 */
            background-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.1) 30%, transparent 50%);
            background-blend-mode: overlay;
        }
        /* 不同大小圆盘宽度和主色调 */
        .disk[data-size="1"] { width: 70px; background: linear-gradient(145deg, #FF8A8A, #e64b2e); }
        .disk[data-size="2"] { width: 90px; background: linear-gradient(145deg, #FFD966, #f39c12); }
        .disk[data-size="3"] { width: 110px; background: linear-gradient(145deg, #6EE7FF, #0aa8c4); }
        .disk[data-size="4"] { width: 130px; background: linear-gradient(145deg, #2ecc71, #1f8a4c); }
        .disk[data-size="5"] { width: 150px; background: linear-gradient(145deg, #e84393, #b71540); }
        .disk[data-size="6"] { width: 170px; background: linear-gradient(145deg, #f39c12, #e67e22); }
        .disk[data-size="7"] { width: 190px; background: linear-gradient(145deg, #3498db, #21618c); }
        .disk[data-size="8"] { width: 210px; background: linear-gradient(145deg, #9b59b6, #6c3483); }

        /* 柱子（贯穿所有圆盘） */
        .peg-rod {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateZ(15px);
            width: 18px;
            height: calc(100% - 40px);
            background: linear-gradient(110deg, #c49a6c, #ecc88b, #b87a42);
            border-radius: 20px;
            box-shadow: 4px 6px 12px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(0,0,0,0.3), inset 2px 2px 6px rgba(255,255,200,0.8);
            z-index: 1;
        }
        .peg-rod::before {
            content: "";
            position: absolute;
            top: -12px;
            left: -5px;
            width: 28px;
            height: 18px;
            background: radial-gradient(circle, #f3d382, #c28a3e);
            border-radius: 50%;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        /* 控制区 */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 20px 0 15px;
            align-items: center;
        }
        button {
            background: linear-gradient(to bottom, #2c3e66, #1a2639);
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 22px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #0f1420;
            transition: 0.07s linear;
            font-family: inherit;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0f1420;
        }
        .disk-slider {
            background: #1e2a3a;
            padding: 5px 18px;
            border-radius: 60px;
            display: flex;
            gap: 15px;
            align-items: center;
            color: white;
            font-weight: bold;
        }
        input { cursor: pointer; }
        .warning-message {
            background: #ff3b3bdd;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            text-align: center;
            margin-top: 12px;
            animation: shakeWarning 0.3s ease, fadeOutWarning 2s forwards;
            pointer-events: none;
        }
        @keyframes shakeWarning {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }
        @keyframes fadeOutWarning {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        @keyframes glowWin {
            0% { text-shadow: 0 0 0 gold; }
            100% { text-shadow: 0 0 15px gold; background-color: rgba(255,215,0,0.3);}
        }
        @keyframes diskFloat {
            0% { transform: translateY(0px) translateZ(5px) rotateX(1deg); }
            50% { transform: translateY(-20px) translateZ(15px) rotateX(5deg); box-shadow: 0 15px 20px black; }
            100% { transform: translateY(0px) translateZ(5px) rotateX(1deg); }
        }
        .auto-move-animation {
            animation: diskFloat 0.25s ease-in-out;
        }
        footer {
            text-align: center;
            color: #ddd;
            font-size: 0.75rem;
            margin-top: 1rem;
        }
        @media (max-width: 800px) {
            .peg { width: 170px; min-width: 150px; }
            .disk[data-size="8"] { width: 150px; }
            .disk[data-size="7"] { width: 135px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🗼 TOWER OF HANOI · 3D ULTIMATE</h1>
    <div class="info-panel">
        <span>🎯 MOVES: <strong id="moveCounter">0</strong></span>
        <span>💿 DISKS: <span id="diskCountLabel">5</span></span>
        <span>⭐ STATUS: <span id="gameStatus">PLAY</span></span>
    </div>
    <div class="hanoi-stage">
        <div class="pegs-wrapper" id="pegsContainer"></div>
    </div>
    <div class="controls">
        <div class="disk-slider">
            <span>🌀 Disks:</span>
            <input type="range" id="diskSlider" min="3" max="8" value="5" step="1">
            <span id="sliderValue">5</span>
        </div>
        <button id="resetBtn">🔄 RESET</button>
        <button id="autoSolveBtn">⚡ AUTO-SOLVE</button>
        <button id="undoBtn">↩️ UNDO</button>
    </div>
    <div id="warningArea" style="min-height: 65px;"></div>
    <footer>💡 Click a peg → select top disk | Click another peg → move | 3D rods go through disks</footer>
</div>

<script>
    // ==================== HANOI GAME CLASS (Full 3D) ====================
    class HanoiGame {
        constructor() {
            this.disksCount = 5;
            this.pegs = [[], [], []];
            this.moves = 0;
            this.isAutoSolving = false;
            this.selectedPegIndex = null;
            this.winFlag = false;
            this.historyStack = [];
            this.autoTimer = null;
        }
        init(disksCount) {
            this.disksCount = Math.min(8, Math.max(3, disksCount));
            this.pegs = [[], [], []];
            for (let i = this.disksCount; i >= 1; i--) {
                this.pegs[0].push(i);
            }
            this.moves = 0;
            this.winFlag = false;
            this.selectedPegIndex = null;
            if (this.isAutoSolving) this.stopAutoSolve();
            this.isAutoSolving = false;
            this.historyStack = [];
            this.pushHistoryState();
            this.render();
            this.updateUI();
        }

        clonePegs() {
            return this.pegs.map(peg => peg.slice());
        }

        pushHistoryState() {
            this.historyStack.push({
                pegs: this.clonePegs(),
                moves: this.moves,
                winFlag: this.winFlag
            });
            if (this.historyStack.length > 50) this.historyStack.shift();
        }

        undo() {
            if (this.isAutoSolving) {
                this.showWarning("Can't undo during auto-solve");
                return false;
            }
            if (this.winFlag) {
                this.showWarning("Game finished, press RESET");
                return false;
            }
            if (this.historyStack.length <= 1) {
                this.showWarning("Nothing to undo");
                return false;
            }
            this.historyStack.pop();
            const last = this.historyStack[this.historyStack.length - 1];
            this.pegs = last.pegs.map(p => p.slice());
            this.moves = last.moves;
            this.winFlag = last.winFlag;
            this.selectedPegIndex = null;
            this.render();
            this.updateUI();
            this.checkWinCondition(true);
            return true;
        }

        isValidMove(fromIdx, toIdx) {
            if (fromIdx === toIdx) return false;
            const fromPeg = this.pegs[fromIdx];
            const toPeg = this.pegs[toIdx];
            if (fromPeg.length === 0) return false;
            const diskFrom = fromPeg[fromPeg.length - 1];
            if (toPeg.length === 0) return true;
            const diskTo = toPeg[toPeg.length - 1];
            return diskFrom < diskTo;
        }

        executeMove(fromIdx, toIdx) {
            if (!this.isValidMove(fromIdx, toIdx)) return false;
            this.pegs[toIdx].push(this.pegs[fromIdx].pop());
            this.moves++;
            this.pushHistoryState();
            this.selectedPegIndex = null;
            this.render();
            this.updateUI();
            this.checkWinCondition();
            return true;
        }

        checkWinCondition(silent = false) {
            if (this.pegs[2].length === this.disksCount && this.disksCount > 0) {
                if (!this.winFlag) {
                    this.winFlag = true;
                    if (!silent) this.showVictoryMessage();
                    this.updateUI();
                    this.render();
                }
                return true;
            } else {
                if (this.winFlag) {
                    this.winFlag = false;
                    this.updateUI();
                    this.render();
                }
                return false;
            }
        }

        showVictoryMessage() {
            const warnDiv = document.getElementById("warningArea");
            warnDiv.innerHTML = `<div class="warning-message" style="animation: glowWin 0.6s infinite alternate, fadeOutWarning 3s forwards; background: #f1c40f; color:#2c3e50;">🏆 VICTORY! You solved it! 🏆</div>`;
            setTimeout(() => {
                if(warnDiv.firstChild) setTimeout(() => { if(warnDiv.firstChild) warnDiv.firstChild.remove(); }, 2800);
            }, 100);
        }

        updateUI() {
            document.getElementById("moveCounter").innerText = this.moves;
            document.getElementById("diskCountLabel").innerText = this.disksCount;
            const statusSpan = document.getElementById("gameStatus");
            if (this.winFlag) statusSpan.innerText = "🏆 VICTORY!";
            else if (this.isAutoSolving) statusSpan.innerText = "🤖 AUTO-SOLVING";
            else statusSpan.innerText = "🎮 PLAY";
        }

        showWarning(msg) {
            const warnDiv = document.getElementById("warningArea");
            const warnEl = document.createElement("div");
            warnEl.className = "warning-message";
            warnEl.innerText = msg;
            warnDiv.innerHTML = "";
            warnDiv.appendChild(warnEl);
            setTimeout(() => warnEl.remove(), 2000);
        }

        attemptSelectOrMove(clickedPegIdx) {
            if (this.isAutoSolving) { this.showWarning("Auto-solving..."); return; }
            if (this.winFlag) { this.showWarning("Game won! Press RESET."); return; }
            if (this.selectedPegIndex === null) {
                if (this.pegs[clickedPegIdx].length > 0) {
                    this.selectedPegIndex = clickedPegIdx;
                    this.render();
                    this.showWarning(`✨ Selected peg ${String.fromCharCode(65+clickedPegIdx)} (top disk size ${this.pegs[clickedPegIdx][this.pegs[clickedPegIdx].length-1]})`);
                } else {
                    this.showWarning(`❌ Peg ${String.fromCharCode(65+clickedPegIdx)} is empty`);
                }
                return;
            }
            const from = this.selectedPegIndex;
            const to = clickedPegIdx;
            if (this.isValidMove(from, to)) {
                this.executeMove(from, to);
                this.render();
            } else {
                this.showWarning("🚫 Invalid move! Larger disk on smaller one.");
                this.selectedPegIndex = null;
                this.render();
            }
        }
        stopAutoSolve() {
            if (this.autoTimer) clearTimeout(this.autoTimer);
            this.isAutoSolving = false;
            this.updateUI();
        }

        generateHanoiSteps(n, from, to, aux, stepsArray) {
            if (n === 1) { stepsArray.push([from, to]); return; }
            this.generateHanoiSteps(n-1, from, aux, to, stepsArray);
            stepsArray.push([from, to]);
            this.generateHanoiSteps(n-1, aux, to, from, stepsArray);
        }

        autoSolve() {
            if (this.isAutoSolving) return;
            if (this.winFlag) { this.showWarning("Reset before auto-solve"); return; }
            this.stopAutoSolve();
            if (this.pegs[0].length !== this.disksCount) {
                this.showWarning("Resetting to initial state for auto-solve...");
                this.init(this.disksCount);
                this.render();
            }
            const steps = [];
            this.generateHanoiSteps(this.disksCount, 0, 2, 1, steps);
            this.isAutoSolving = true;
            this.updateUI();
            this.selectedPegIndex = null;
            this.render();
            let index = 0;
            const executeStep = () => {
                if (!this.isAutoSolving) return;
                if (index >= steps.length) {
                    this.isAutoSolving = false;
                    this.updateUI();
                    this.showWarning("✨ Auto-solve finished! ✨");
                    this.checkWinCondition();
                    this.render();
                    return;
                }
                const [from, to] = steps[index];
                if (this.isValidMove(from, to)) {
                    this.animateDiskAndMove(from, to, () => {
                        this.executeMove(from, to);
                        this.render();
                        index++;
                        this.autoTimer = setTimeout(executeStep, 280);
                    });
                } else {
                    index++;
                    this.autoTimer = setTimeout(executeStep, 50);
                }
            };
            executeStep();
        }

        animateDiskAndMove(from, to, callback) {
            const pegDivs = document.querySelectorAll('.peg');
            if (pegDivs[from]) {
                const stackDiv = pegDivs[from].querySelector('.disks-stack');
                if (stackDiv && stackDiv.lastChild) {
                    const topDisk = stackDiv.lastChild;
                    topDisk.classList.add('auto-move-animation');
                    setTimeout(() => {
                        topDisk.classList.remove('auto-move-animation');
                        callback();
                    }, 220);
                } else callback();
            } else callback();
        }

        render() {
            const container = document.getElementById("pegsContainer");
            if (!container) return;
            container.innerHTML = "";
            for (let i = 0; i < 3; i++) {
                const pegDiv = document.createElement("div");
                pegDiv.className = "peg";
                if (this.selectedPegIndex === i) pegDiv.classList.add("selected");
                pegDiv.setAttribute("data-peg", i);

                // 柱子（绝对定位，贯穿所有圆盘）
                const rod = document.createElement("div");
                rod.className = "peg-rod";

                // 圆盘堆叠区（相对定位，用于放置圆盘）
                const stackDiv = document.createElement("div");
                stackDiv.className = "disks-stack";

                const disksOnPeg = [...this.pegs[i]];
                for (let sz of disksOnPeg) {
                    const disk = document.createElement("div");
                    disk.className = "disk";
                    disk.setAttribute("data-size", sz);
                    disk.style.width = `${Math.min(220, 50 + sz * 18)}px`;
                    stackDiv.appendChild(disk);
                }

                pegDiv.appendChild(rod);
                pegDiv.appendChild(stackDiv);
                pegDiv.addEventListener("click", (e) => {
                    e.stopPropagation();
                    this.attemptSelectOrMove(i);
                });
                container.appendChild(pegDiv);
            }
        }
    }
    // ==================== PAGE INITIALIZATION ====================
    const game = new HanoiGame();
    const slider = document.getElementById("diskSlider");
    const sliderVal = document.getElementById("sliderValue");
    const resetBtn = document.getElementById("resetBtn");
    const autoBtn = document.getElementById("autoSolveBtn");
    const undoBtn = document.getElementById("undoBtn");

    slider.addEventListener("input", (e) => {
        if (game.isAutoSolving) {
            game.showWarning("Stop auto-solve first");
            slider.value = game.disksCount;
            sliderVal.innerText = game.disksCount;
            return;
        }
        const val = parseInt(e.target.value, 10);
        sliderVal.innerText = val;
        game.init(val);
        game.render();
    });

    resetBtn.addEventListener("click", () => {
        if (game.isAutoSolving) game.stopAutoSolve();
        game.init(game.disksCount);
        game.render();
        game.showWarning("Game reset!");
    });

    autoBtn.addEventListener("click", () => {
        if (game.winFlag) {
            game.showWarning("Victory! Press RESET first");
            return;
        }
        game.autoSolve();
    });

    undoBtn.addEventListener("click", () => {
        game.undo();
        game.render();
    });

    game.init(5);
    game.render();
    game.showWarning("🎮 Click a peg to select top disk → then click another peg to move!");
</script>
</body>
</html>
