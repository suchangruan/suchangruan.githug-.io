<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态千里江山</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            height: 100vh;
            background: #000;
        }
        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://picsum.photos/id/1036/1920/1080') center/cover no-repeat;
            animation: mountain-sway 30s ease-in-out infinite alternate;
        }
        /* 山峦微动效果 */
        @keyframes mountain-sway {
            0% { transform: translate(0, 0) scale(1.01); }
            100% { transform: translate(0, -5px) scale(1.02); }
        }
        /* 云雾层 */
        .cloud {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('https://picsum.photos/id/1025/1920/1080') repeat-x;
            opacity: 0.3;
            mix-blend-mode: screen;
        }
        .cloud-1 {
            animation: cloud-flow 80s linear infinite;
        }
        .cloud-2 {
            animation: cloud-flow 120s linear infinite reverse;
            opacity: 0.2;
        }
        /* 云雾水平流动 */
        @keyframes cloud-flow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        /* 前景村落微动 */
        .village {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            animation: village-sway 20s ease-in-out infinite alternate;
        }
        @keyframes village-sway {
            0% { transform: translateY(0); }
            100% { transform: translateY(-3px); }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="village"></div>
    </div>
</body>
</html>
